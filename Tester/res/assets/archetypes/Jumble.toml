#meta version=1.0 type=archetype

[archetype]
draw = [
	"sprite3",
	"sprite4",
	"sprite5",
	"sprite1",
	"godot_icon",
	"knight",
	"atlased_knight",
	"grass_tilemap",
	"test_text",
	"nonant_panel",
	"smol_text"
]

[sprite3]
Texture = "@/textures/serotonin.gif"
Trfmer = { Position = [ 400, 400 ], Scale = [ 0.5, 0.5 ] }
FrmForm = { FrmCount = 59, DelayS = -0.05 }

[sprite4]
Texture = "@/textures/tux.png"
TxIndex = 1
Trfmer = { Position = [-500, 300], Scale = [0.1, 0.1] }

[sprite5]
Texture = "@/textures/tux.png"
Trfmer = { Position = [-400, 300], Scale = [0.1, 0.1] }

[sprite1]
Texture = "@/textures/einstein.png"

[godot_icon]
Texture = "@/textures/godot.svg"
TxIndex = 1
Trfmer = { Position = [-300, -200], "Rotation" = 0.3, Scale = [1.0, 1.0] }

[knight]
Texture = "@/textures/knight.png"
Trfmer = { Position = [100, -300], Scale = [20, 20] }
FrmForm = { Mode = 1 }

[atlased_knight]
Rows = 2
Cols = 3
DelayS = 0.1
	[atlased_night.Sprite]
	Texture = "@/textures/knight.png"
	TxIndex = 1
	Trfmer = { Position = [300, -200], Scale = [20, 20] }

[nonant_panel]
NSize = [ 128, 0 ]
Offsets = { Uniform = 6 }
[nonant_panel.Sprite]
Texture = "@/textures/panel.png"
Trfmer = { Scale = [ 10.0, 10.0 ] }

[grass_tilemap]
Trfmer = { Scale = [ 100, 100 ] }

	[[grass_tilemap.Layer]]
	Z = 0
	TileSet = "@/assets/grass tileset.toml"
	Tiles = [
		[ -1, -1 ],
		[  0, -1 ],
		[  1, -1 ],
		[ -1,  0 ],
		[  1,  0 ],
		[  2,  0 ],
		[ -1,  1 ],
		[  0,  1 ],
		[  1,  1 ],
		[  2,  2 ],
		[  3,  2 ],
		[  2,  3 ],
		[  3,  3 ],
	]
	
[test_text]
DrawBkg = true
Trfmer = { Position = [ -400, 400 ], Scale = [ 0.8, 0.8 ] }
BkgColor = [ 0.5, 0.4, 0.2, 0.8 ]
	[test_text.Format]
	Pivot = [ 0, 1 ]
	LineSp = 1.5
	LineBrk = 2.0
	MinSize = [ 800, 1200 ]
	Padding = [ 50, 50 ]
	HAlign = 1
	VAlign = 4
	[[test_text.Element]]
	Font = "@/fonts/Roboto-Regular.ttf"
	Text = "rgb"
	TextColor = [ 1.0, 0.0, 0.0, 1.0 ]
	[[test_text.Element]]
	Font = "@/fonts/Roboto-Regular.ttf"
	Text = "g"
	TextColor = [ 0.0, 1.0, 0.0, 1.0 ]
	Scale = [ 2.0, 0.5 ]
	LineYPiv = 0.5
	[[test_text.Element]]
	Font = "@/fonts/Roboto-Regular.ttf"
	Text = "b"
	TextColor = [ 0.0, 0.0, 1.0, 1.0 ]
	[[test_text.Element]]
	Font = "@/fonts/Roboto-Regular.ttf"
	Text = "x\txx  x.\nabcd !!!\r\n\n123478s\nHex"
	TextColor = [ 0.0, 0.0, 0.0, 1.0 ]
	AdjOff = 50

[smol_text]
DrawBkg = true
BkgColor = [ 0.3, 0.3, 0.3, 1.0 ]
CamInv = true
	[[smol_text.Element]]
	Font = "@/fonts/Roboto-Regular.ttf"
	Text = "abcdef"
	TextColor = [ 0.8, 0.8, 0.9, 1.0 ]
